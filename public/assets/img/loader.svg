        <animate attributeName="y" values="70;45;70" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </text>

    <text x="175" y="70" font-size="50" fill="url(#grad1)">n
        <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" begin="0.75s" repeatCount="indefinite"/>
        <animate attributeName="y" values="70;45;70" dur="1.5s" begin="0.75s" repeatCount="indefinite"/>
    </text>

    <text x="210" y="70" font-size="50" fill="url(#grad1)">a
        <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
        <animate attributeName="y" values="70;45;70" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
