<svg width="320" height="100" viewBox="0 0 320 100"
     xmlns="http://www.w3.org/2000/svg"
     font-family="Arial"
     font-weight="bold">

    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0162e8"/>
            <stop offset="50%" stop-color="#00c3ff"/>
            <stop offset="100%" stop-color="#0162e8"/>
        </linearGradient>
    </defs>

    <text x="20" y="70" font-size="50" fill="url(#grad1)">R
        <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="y" values="70;45;70" dur="1.5s" repeatCount="indefinite"/>
    </text>

    <text x="60" y="70" font-size="50" fill="url(#grad1)">e
        <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" begin="0.15s" repeatCount="indefinite"/>
        <animate attributeName="y" values="70;45;70" dur="1.5s" begin="0.15s" repeatCount="indefinite"/>
    </text>

    <text x="95" y="70" font-size="50" fill="url(#grad1)">h
        <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
        <animate attributeName="y" values="70;45;70" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </text>

    <text x="130" y="70" font-size="50" fill="url(#grad1)">l
        <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" begin="0.45s" repeatCount="indefinite"/>
        <animate attributeName="y" values="70;45;70" dur="1.5s" begin="0.45s" repeatCount="indefinite"/>
    </text>

    <text x="150" y="70" font-size="50" fill="url(#grad1)">t
