<svg width="320" height="100" viewBox="0 0 320 100"
     xmlns="http://www.w3.org/2000/svg"
     font-family="Arial"
     font-weight="bold">

    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0162e8"/>
            <stop offset="50%" stop-color="#00c3ff"/>
            <stop offset="100%" stop-color="#0162e8"/>
        </linearGradient>
    </defs>

    <!-- C -->
    <text x="40" y="70" font-size="50" fill="url(#grad1)">C
        <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
        <animate attributeName="y" values="70;45;70" dur="1s" repeatCount="indefinite"/>
    </text>

    <!-- A -->
    <text x="100" y="70" font-size="50" fill="url(#grad1)">A
        <animate attributeName="opacity" values="1;0.3;1" dur="1s" begin="0.2s" repeatCount="indefinite"/>
        <animate attributeName="y" values="70;45;70" dur="1s" begin="0.2s" repeatCount="indefinite"/>
    </text>

    <!-- P -->
    <text x="160" y="70" font-size="50" fill="url(#grad1)">P
        <animate attributeName="opacity" values="1;0.3;1" dur="1s" begin="0.4s" repeatCount="indefinite"/>
        <animate attributeName="y" values="70;45;70" dur="1s" begin="0.4s" repeatCount="indefinite"/>
    </text>

    <!-- S -->
    <text x="220" y="70" font-size="50" fill="url(#grad1)">S
        <animate attributeName="opacity" values="1;0.3;1" dur="1s" begin="0.6s" repeatCount="indefinite"/>
        <animate attributeName="y" values="70;45;70" dur="1s" begin="0.6s" repeatCount="indefinite"/>
    </text>

</svg>
